apiVersion: v1
kind: ConfigMap
metadata:
  name: taskflow-api-config
  namespace: taskflow-blue
  labels:
    app: taskflow-api
    environment: blue
data:
  ENVIRONMENT: "blue"
  LOG_LEVEL: "INFO"
  CORS_ORIGINS: "https://app-blue.taskflow.pro,https://app.taskflow.pro"
  DB_POOL_SIZE: "20"
  DB_MAX_OVERFLOW: "10"
  DB_POOL_TIMEOUT: "30"
  DB_POOL_RECYCLE: "1800"
  REDIS_POOL_SIZE: "50"
  JWT_ALGORITHM: "HS256"
  JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  JWT_REFRESH_TOKEN_EXPIRE_DAYS: "7"
  PASSWORD_RESET_TOKEN_EXPIRE_HOURS: "24"
  WEBSOCKET_MAX_CONNECTIONS: "10000"
  RATE_LIMIT_REQUESTS_PER_MINUTE: "100"
  ENABLE_METRICS: "true"
  METRICS_PORT: "9090"
  HEALTH_CHECK_INTERVAL: "30"
  TASK_CLEANUP_DAYS: "90"
  NOTIFICATION_BATCH_SIZE: "100"
  FILE_UPLOAD_MAX_SIZE_MB: "50"
  ALLOWED_FILE_TYPES: "jpg,jpeg,png,pdf,doc,docx,xls,xlsx"
