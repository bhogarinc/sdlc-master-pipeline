name: Blue-Green Deployment

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      target_environment:
        description: 'Target environment (blue or green)'
        required: true
        default: 'green'
        type: choice
        options:
          - blue
          - green
      canary_percentage:
        description: 'Canary percentage (0-100, 0 for full switch)'
        required: false
        default: '0'
        type: string
      skip_tests:
        description: 'Skip smoke tests'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  AKS_CLUSTER: taskflow-prod
  AKS_RESOURCE_GROUP: taskflow-rg

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Set version
        id: version
        run: echo "version=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: echo "Running tests"

  deploy:
    runs-on: ubuntu-latest
    needs: [build, test]
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to target
        run: echo "Deploying version ${{ needs.build.outputs.version }}"
